<div class="login-wrapper" fxLayout="row" fxLayoutAlign="center center">

    <mat-card class="box mat-input-full-width">
      <mat-card-header>
        <mat-card-title>Create an account</mat-card-title>
      </mat-card-header>
  
      <form class="example-form">
        <mat-card-content>

            <mat-form-field appearance="outline" class="mat-input-full-width ">
                <mat-label>Name</mat-label>
                <input matInput type="text" placeholder="Name">
            </mat-form-field>

            <mat-form-field appearance="outline" class="mat-input-full-width ">
                <mat-label>Email</mat-label>
                <input matInput type="email" placeholder="Email">
            </mat-form-field>
  
          <mat-form-field appearance="outline" class="mat-input-full-width ">
            <mat-label>Password</mat-label>
            <input matInput type="password" placeholder="Password">
          </mat-form-field>

        </mat-card-content>
        <button mat-raised-button color="primary" class="float-end bg-primary text-white">Register</button>

        Already have an account ? <a href="/"> Login here</a>
    </form>
    </mat-card>
  
  </div>
